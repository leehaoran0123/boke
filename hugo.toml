baseURL = "https://leehaoran0123.github.io/boke/"
languageCode = "zh-cn"
title = "我的博客"
theme = "PaperMod"

contentDir = "content"

paginate = 10
enableRobotsTXT = true

[params]
  description = "个人博客"
  author = "lihaoran"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true

[params.homeInfoParams]
  Title = "欢迎来到我的博客"
  Content = "记录技术与生活"

[taxonomies]
  tag = "tags"
  author = "author"

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]
